<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta name="_current_user_id" th:content="${currentUserId}"/>

    <title th:text="#{dashboard.title}">Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />


    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script th:src="@{/js/sidebar.js}" defer></script>
    <script th:src="@{/js/header.js}" defer></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

</head>
<body>

<!-- Sidebar -->
<div th:replace="~{fragments :: sidebar}"></div>
<div th:replace="~{fragments :: header}"></div>




<!-- Main Dashboard -->
<main class="dashboard-container">
    <div class="dashboard-content">
    <div class="dashboard-header">
        <h1 class="dashboard-title" th:text="#{dashboard.title}">Dashboard</h1>
        <p class="dashboard-subtitle" th:text="#{dashboard.subtitle}">Overview of your key metrics and performance indicators</p>
    </div>

    <div class="dashboard-grid">
        <!-- TOP ROW: 4 Small Cards -->
        <div class="kpi-card kpi-top-row" id="total-members">
            <div class="kpi-header">
                <h3 class="kpi-title" th:text="#{dashboard.kpi.totalMembers}">Total Members</h3>
                <div class="kpi-icon">
                    <i class="fas fa-users"></i>
                </div>
            </div>
            <div class="kpi-value" id="total-members-value">-</div>
        </div>

        <div class="kpi-card kpi-top-row" id="active-members">
            <div class="kpi-header">
                <h3 class="kpi-title" th:text="#{dashboard.kpi.activeMembers}">Active Members</h3>
                <div class="kpi-icon">
                    <i class="fas fa-user-check"></i>
                </div>
            </div>
            <div class="kpi-value" id="active-members-value">-</div>
        </div>

        <div class="kpi-card kpi-top-row" id="growth-card">
            <div class="kpi-header">
                <h3 class="kpi-title" th:text="#{dashboard.kpi.monthlyGrowth}">Monthly Growth</h3>
                <div class="kpi-icon">
                    <i class="fas fa-trending-up"></i>
                </div>
            </div>
            <div class="kpi-value" id="growth-value">-</div>
            <div class="kpi-change positive">
                <i class="fas fa-arrow-up"></i>
                <span th:text="#{dashboard.kpi.monthlyGrowth.change}">New members</span>
            </div>
        </div>


        <!-- MIDDLE ROW: Revenue Chart (Full Width) -->
        <div class="kpi-card kpi-middle-row" id="revenue-card">
            <div class="kpi-header">
                <h3 class="kpi-title" th:text="#{dashboard.kpi.revenueThisMonth}">Revenue This Month</h3>
                <div class="kpi-icon">
                    <i class="fas fa-euro-sign"></i>
                </div>
            </div>
            <div class="kpi-value" id="revenue-value">-</div>
            <div class="chart-container">
                <canvas id="revenueChart"></canvas>
            </div>
        </div>

        <!-- BOTTOM ROW: Events and Failed Payments -->
        <div class="kpi-card kpi-bottom-row" id="upcoming-events">
            <div class="kpi-header">
                <h3 class="kpi-title" th:text="#{dashboard.kpi.upcomingEvents}">Upcoming Events</h3>
                <div class="kpi-icon">
                    <i class="fas fa-calendar-alt"></i>
                </div>
            </div>
            <div class="kpi-value" id="events-count">-</div>
            <ul class="kpi-list" id="events-list">
                <li class="kpi-list-item" th:text="#{dashboard.kpi.events.loading}">Loading events...</li>
            </ul>
        </div>

        <div class="kpi-card kpi-bottom-row" id="failed-payments">
            <div class="kpi-header">
                <h3 class="kpi-title" th:text="#{dashboard.kpi.failedPayments}">Failed Payments</h3>
                <div class="kpi-icon">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
            </div>
            <div class="kpi-value" id="failed-payments-value">-</div>
            <div class="kpi-stats" id="failed-payments-stats">
                <div class="stat-row">
                    <span class="stat-label" th:text="#{dashboard.kpi.failedPayments.thisWeek}">This Week</span>
                    <span class="stat-value" id="failed-this-week">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label" th:text="#{dashboard.kpi.failedPayments.lastWeek}">Last Week</span>
                    <span class="stat-value" id="failed-last-week">-</span>
                </div>
            </div>
        </div>
    </div>
    </div>
</main>

<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        const currentUserId = document.querySelector('meta[name="_current_user_id"]')?.getAttribute('content');
        let revenueChart;

        const i18n = {
            eventsNoUpcoming: /*[[#{dashboard.kpi.events.noUpcoming}]]*/ 'No upcoming events'
        };

        // Sidebar collapse observer
        const sidebar = document.querySelector('.sidebar');
        const dashboardContainer = document.querySelector('.dashboard-container');
        if (sidebar && dashboardContainer) {
            const observer = new MutationObserver(mutations => {
                mutations.forEach(m => {
                    if (m.type === 'attributes' && m.attributeName === 'class') {
                        dashboardContainer.classList.toggle('sidebar-collapsed',
                            m.target.classList.contains('collapsed'));
                    }
                });
            });
            observer.observe(sidebar, { attributes: true });
            if (sidebar.classList.contains('collapsed')) {
                dashboardContainer.classList.add('sidebar-collapsed');
            }
        }

        // Build an empty chart on page load; data is populated by loadChartData()
        function initRevenueChart() {
            const ctx = document.getElementById('revenueChart');
            if (!ctx) return;
            revenueChart = new Chart(ctx.getContext('2d'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#f59e0b',
                        pointBorderColor: '#ffffff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => '€' + ctx.parsed.y.toFixed(2)
                            }
                        }
                    },
                    scales: {
                        x: {
                            display: true,
                            grid: { display: false },
                            ticks: { color: '#6b7280', font: { size: 12 } }
                        },
                        y: {
                            display: true,
                            grid: { color: '#f3f4f6' },
                            ticks: {
                                color: '#6b7280',
                                font: { size: 12 },
                                callback: v => '€' + v
                            }
                        }
                    },
                    elements: { point: { radius: 4 } }
                }
            });
        }

        // Fetch daily revenue aggregation from the local database and repaint the chart
        function loadChartData() {
            fetch('/api/dashboard/chart/revenue')
                .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
                .then(chart => {
                    if (revenueChart && Array.isArray(chart.labels) && Array.isArray(chart.data)) {
                        revenueChart.data.labels = chart.labels;
                        revenueChart.data.datasets[0].data = chart.data;
                        revenueChart.update();
                    }
                })
                .catch(err => console.error('Chart data load failed:', err));
        }

        // Fetch all KPI tiles for the authenticated user from the local database
        function loadKPIs() {
            const token  = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const header = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
            const headers = { 'Content-Type': 'application/json' };
            if (token && header) headers[header] = token;

            fetch('/api/dashboard/me', { method: 'GET', headers })
                .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
                .then(kpis => {
                    if (Array.isArray(kpis)) kpis.forEach(kpi => updateKPI(kpi.key, kpi));
                })
                .catch(err => console.error('KPI load failed:', err));
        }

        function updateKPI(key, data) {
            try {
                switch (key) {
                    case 'members.total.count':
                        document.getElementById('total-members-value').textContent =
                            data.formattedValue ?? data.value ?? '-';
                        break;

                    case 'members.active.count':
                        document.getElementById('active-members-value').textContent =
                            data.formattedValue ?? data.value ?? '-';
                        break;

                    case 'revenue.this.month':
                        document.getElementById('revenue-value').textContent =
                            data.formattedValue ?? data.value ?? '-';
                        break;

                    case 'members.growth.month':
                        document.getElementById('growth-value').textContent =
                            data.formattedValue ?? data.value ?? '-';
                        break;

                    case 'transactions.failed': {
                        const isSummary = data.type === 'summary';
                        const stats  = isSummary ? data.value : null;
                        const total  = stats ? stats.total : (data.value ?? 0);
                        document.getElementById('failed-payments-value').textContent = total;
                        if (stats) {
                            const thisWeekEl = document.getElementById('failed-this-week');
                            const lastWeekEl = document.getElementById('failed-last-week');
                            if (thisWeekEl) thisWeekEl.textContent = stats.thisWeek;
                            if (lastWeekEl) lastWeekEl.textContent = stats.lastWeek;
                        }
                        break;
                    }

                    case 'events.upcoming': {
                        const events     = data.type === 'list' ? data.value : [];
                        const eventsCount = document.getElementById('events-count');
                        const eventsList  = document.getElementById('events-list');
                        if (events && events.length > 0) {
                            if (eventsCount) eventsCount.textContent = events.length;
                            if (eventsList) {
                                eventsList.innerHTML = events.slice(0, 5)
                                    .map(e => `<li class="kpi-list-item">${e}</li>`)
                                    .join('');
                            }
                        } else {
                            if (eventsCount) eventsCount.textContent = '0';
                            if (eventsList) {
                                eventsList.innerHTML =
                                    `<li class="kpi-list-item">${i18n.eventsNoUpcoming}</li>`;
                            }
                        }
                        break;
                    }
                }
            } catch (err) {
                console.error('KPI update failed for', key, err);
            }
        }

        initRevenueChart();
        loadKPIs();
        loadChartData();

        // Refresh KPIs and chart every 5 minutes
        setInterval(() => { loadKPIs(); loadChartData(); }, 5 * 60 * 1000);
    });
</script>

</body>
</html>
